name: Photo Analysis
on:
  workflow_dispatch:
    inputs:
      photo_url:
        description: 'Photo URL'
        required: true
      prompt:
        description: 'Prompt'
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Download model from Release
        run: |
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/config.json
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/tokenizer.json
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/tokenizer_config.json
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/vocab.json
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/merges.txt
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/generation_config.json
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/preprocessor_config.json
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/model.safetensors.index.json
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/chat_template.json
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/model-00001-of-00002.safetensors.part_aa
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/model-00001-of-00002.safetensors.part_ab
          wget -q https://github.com/mark98molchanov-a11y/qwen2-vl-model/releases/download/v2b/model-00002-of-00002.safetensors
          cat model-00001-of-00002.safetensors.part_* > model-00001-of-00002.safetensors
          rm model-00001-of-00002.safetensors.part_*
      
      - name: Analyze photo
        run: |
          pip install transformers Pillow requests torch accelerate --quiet
          
          python3 << 'PYEOF'
          from transformers import Qwen2VLForConditionalGeneration, AutoProcessor
          from PIL import Image
          import requests
          import os
          
          model = Qwen2VLForConditionalGeneration.from_pretrained('.', device_map='cpu')
          processor = AutoProcessor.from_pretrained('.')
          
          photo_url = os.environ['PHOTO_URL']
          prompt = os.environ['PROMPT']
          
          image = Image.open(requests.get(photo_url, stream=True).raw)
          
          messages = [
              {'role': 'user', 'content': [
                  {'type': 'image', 'image': image},
                  {'type': 'text', 'text': prompt}
              ]}
          ]
          
          inputs = processor.apply_chat_template(messages, return_tensors='pt')
          outputs = model.generate(**inputs, max_new_tokens=500)
          print(processor.decode(outputs[0], skip_special_tokens=True))
          PYEOF
        env:
          PHOTO_URL: ${{ inputs.photo_url }}
          PROMPT: ${{ inputs.prompt }}
