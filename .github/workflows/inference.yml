      - name: Analyze photo
        run: |
          pip install transformers Pillow requests torch accelerate torchvision --quiet
          
          python3 << 'PYEOF'
          from transformers import Qwen2VLForConditionalGeneration, AutoProcessor
          from PIL import Image
          import requests
          import os
          from io import BytesIO
          import torch
          
          model = Qwen2VLForConditionalGeneration.from_pretrained('.', device_map='cpu')
          processor = AutoProcessor.from_pretrained('.')
          
          photo_url = os.environ['PHOTO_URL']
          prompt = os.environ['PROMPT']
          
          # Скачиваем фото
          headers = {"User-Agent": "Mozilla/5.0", "Accept": "image/*"}
          response = requests.get(photo_url, headers=headers, timeout=30)
          
          if response.status_code != 200:
              api_url = photo_url.replace('raw.githubusercontent.com', 'api.github.com/repos').replace('/main/', '/contents/')
              api_resp = requests.get(api_url, headers={"Authorization": f"token {os.environ['GH_TOKEN']}"}, timeout=30)
              if api_resp.status_code == 200:
                  import base64
                  response._content = base64.b64decode(api_resp.json()['content'])
          
          image = Image.open(BytesIO(response.content))
          
          messages = [
              {'role': 'user', 'content': [
                  {'type': 'image', 'image': image},
                  {'type': 'text', 'text': prompt}
              ]}
          ]
          
          # Правильный вызов generate
          inputs = processor.apply_chat_template(messages, return_tensors="pt")
          with torch.no_grad():
              generated_ids = model.generate(
                  **inputs,
                  max_new_tokens=500,
                  do_sample=False
              )
          result = processor.decode(generated_ids[0], skip_special_tokens=True)
          
          print("=" * 60)
          print("📝 RESULT:")
          print(result)
          print("=" * 60)
          PYEOF
        env:
          PHOTO_URL: ${{ inputs.photo_url }}
          PROMPT: ${{ inputs.prompt }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
