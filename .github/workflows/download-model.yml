name: Download Model from Hugging Face
on: workflow_dispatch

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Download model files
        run: |
          pip install huggingface_hub
          hf download Qwen/Qwen2-VL-7B-Instruct --local-dir .
      
      - name: Split large files into parts
        run: |
          mkdir -p parts
          # Разбиваем файлы > 2 GB на части по 1.9 GB
          for f in model-*.safetensors; do
            size=$(stat -c%s "$f")
            if [ $size -gt 1990000000 ]; then
              echo "Splitting $f ($(du -h $f | cut -f1))..."
              split -b 1900M "$f" "parts/${f}.part_"
              rm "$f"
            else
              mv "$f" parts/
            fi
          done
          # Перемещаем остальные файлы
          for f in config.json tokenizer.json tokenizer_config.json vocab.json merges.txt generation_config.json preprocessor_config.json chat_template.json model.safetensors.index.json LICENSE README.md .gitattributes; do
            [ -f "$f" ] && mv "$f" parts/
          done
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: "Qwen2-VL-7B-Instruct Model"
          files: parts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
