name: Download Qwen2-VL-2B to Releases
on: workflow_dispatch

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download model
        run: |
          pip install huggingface_hub
          hf download Qwen/Qwen2-VL-2B-Instruct --local-dir ./model
      
      - name: Split large files
        run: |
          mkdir -p parts
          cd model
          for f in model-*.safetensors; do
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ $size -gt 1990000000 ]; then
              echo "Splitting $f (${size} bytes)..."
              split -b 1900M "$f" "../parts/${f}.part_"
            else
              cp "$f" ../parts/
            fi
          done
          cp *.json *.txt *.md ../parts/ 2>/dev/null
          ls -la ../parts/
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2b
          name: "Qwen2-VL-2B-Instruct"
          files: parts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
