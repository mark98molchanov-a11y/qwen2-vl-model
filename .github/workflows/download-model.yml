name: Download Model from Hugging Face
on: workflow_dispatch

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true
      
      - name: Download model files
        run: |
          pip install huggingface_hub
          huggingface-cli download Qwen/Qwen2-VL-7B-Instruct --local-dir . --local-dir-use-symlinks False
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Download Qwen2-VL model from Hugging Face" || echo "No changes to commit"
          git push
